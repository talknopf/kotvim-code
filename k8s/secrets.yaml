# NOTE: Replace placeholder values before applying!
# For production, use External Secrets Operator or AWS Secrets Manager
apiVersion: v1
kind: Secret
metadata:
  name: kotvim-code-secrets
  namespace: kotvim-code
type: Opaque
stringData:
  DATABASE_URL: "postgresql://kotvim:CHANGE_ME@your-rds-endpoint:5432/kotvim_code?schema=public"
  NEXTAUTH_SECRET: "CHANGE_ME_GENERATE_WITH_openssl_rand_base64_32"
  GOOGLE_CLIENT_ID: "CHANGE_ME"
  GOOGLE_CLIENT_SECRET: "CHANGE_ME"
