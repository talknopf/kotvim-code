name: Deploy

on:
  push:
    branches:
      - master

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: eu-west-1
  EKS_CLUSTER_NAME: pressto-prod
  K8S_NAMESPACE: kotvim-code
  ECR_REPOSITORY: kotvim-code

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy to EKS

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS account ID
        id: aws-account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT

      - name: Set ECR registry
        id: ecr-registry
        run: |
          REGISTRY="${{ steps.aws-account.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          echo "registry=$REGISTRY" >> $GITHUB_OUTPUT

      - name: Ensure ECR repository exists
        run: |
          if ! aws ecr describe-repositories --repository-names ${{ env.ECR_REPOSITORY }} --region ${{ env.AWS_REGION }} 2>/dev/null; then
            echo "Creating ECR repository..."
            aws ecr create-repository \
              --repository-name ${{ env.ECR_REPOSITORY }} \
              --region ${{ env.AWS_REGION }} \
              --image-scanning-configuration scanOnPush=true \
              --encryption-configuration encryptionType=AES256
          else
            echo "ECR repository already exists"
          fi

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest
          echo "image=$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Ensure K8s namespace exists
        run: |
          kubectl create namespace ${{ env.K8S_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Replace image in deployment manifest
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          sed -i "s|<AWS_ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/kotvim-code:latest|$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG|g" k8s/deployment.yaml

      - name: Apply Kubernetes manifests (excluding secrets)
        run: |
          # Apply everything EXCEPT secrets.yaml to avoid overwriting
          # real credentials with placeholder values.
          # Use update-secrets workflow to manage secrets separately.
          for f in k8s/*.yaml; do
            if [ "$(basename $f)" != "secrets.yaml" ]; then
              echo "Applying $f..."
              kubectl apply -f "$f" -n ${{ env.K8S_NAMESPACE }}
            else
              echo "Skipping $f (managed separately via update-secrets workflow)"
            fi
          done

      - name: Ensure secrets exist (create only if missing)
        run: |
          if ! kubectl get secret kotvim-code-secrets -n ${{ env.K8S_NAMESPACE }} 2>/dev/null; then
            echo "Secret doesn't exist, creating from template..."
            kubectl apply -f k8s/secrets.yaml -n ${{ env.K8S_NAMESPACE }}
            echo "WARNING: Secrets created with placeholder values. Run update-secrets workflow!"
          else
            echo "Secrets already exist, not overwriting."
          fi

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/kotvim-code -n ${{ env.K8S_NAMESPACE }} --timeout=5m
