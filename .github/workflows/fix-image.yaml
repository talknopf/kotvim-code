name: Fix Binary Image
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Decode base64 image to binary
        run: |
          echo "Current file info:"
          file public/images/tal.jpg
          ls -la public/images/tal.jpg
          echo "First 20 bytes as hex:"
          xxd -l 20 public/images/tal.jpg
          echo "---"
          if file public/images/tal.jpg | grep -q "ASCII\|text"; then
            echo "File is text (base64), converting to binary..."
            # Strip any whitespace/newlines and decode
            tr -d '\n\r\t ' < public/images/tal.jpg | base64 -d > /tmp/tal_binary.jpg
            echo "Decoded file info:"
            file /tmp/tal_binary.jpg
            ls -la /tmp/tal_binary.jpg
            cp /tmp/tal_binary.jpg public/images/tal.jpg
            echo "Done!"
          else
            echo "File is already binary, no fix needed."
          fi

      - name: Commit fixed image
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/images/tal.jpg
          git diff --staged --quiet && echo "No changes" || git commit -m "fix: decode tal.jpg from base64 text to actual JPEG binary"
          git push
