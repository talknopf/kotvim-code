name: Fix Binary Image
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Decode base64 image to binary
        run: |
          echo "Current file info:"
          file public/images/tal.jpg
          ls -la public/images/tal.jpg
          echo "---"
          python3 -c "
          import base64
          with open('public/images/tal.jpg', 'r') as f:
              b64_text = f.read().strip()
          print(f'Read {len(b64_text)} chars of base64')
          binary = base64.b64decode(b64_text)
          print(f'Decoded to {len(binary)} bytes')
          with open('public/images/tal.jpg', 'wb') as f:
              f.write(binary)
          print('Written binary JPEG')
          "
          echo "Result:"
          file public/images/tal.jpg
          ls -la public/images/tal.jpg

      - name: Commit fixed image
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/images/tal.jpg
          git diff --staged --quiet && echo "No changes" || git commit -m "fix: decode tal.jpg from base64 text to actual JPEG binary"
          git push
