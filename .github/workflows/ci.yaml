name: CI

on:
  pull_request:
    branches:
      - master

jobs:
  lint-typecheck-build:
    runs-on: ubuntu-latest
    name: Lint, Typecheck & Build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run typecheck
        run: npm run build
