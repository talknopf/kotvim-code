name: Deploy RDS & Wire Secrets

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: eu-west-1
  EKS_CLUSTER_NAME: pressto-prod
  K8S_NAMESPACE: kotvim-code
  RDS_IDENTIFIER: kotvim-code-db
  RDS_DB_NAME: kotvim_code
  RDS_USERNAME: kotvim

jobs:
  deploy-rds:
    runs-on: ubuntu-latest
    name: Wire RDS → K8s Secrets → Prisma Migrate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Get RDS info ─────────────────────────────────
      - name: Get RDS endpoint
        id: rds
        run: |
          ENDPOINT=$(aws rds describe-db-instances \
            --db-instance-identifier ${{ env.RDS_IDENTIFIER }} \
            --region ${{ env.AWS_REGION }} \
            --query 'DBInstances[0].Endpoint.Address' --output text)
          STATUS=$(aws rds describe-db-instances \
            --db-instance-identifier ${{ env.RDS_IDENTIFIER }} \
            --region ${{ env.AWS_REGION }} \
            --query 'DBInstances[0].DBInstanceStatus' --output text)

          echo "endpoint=$ENDPOINT" >> $GITHUB_OUTPUT
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "RDS endpoint: $ENDPOINT (status: $STATUS)"

      - name: Wait for RDS to be available
        run: |
          echo "Waiting for RDS to be available..."
          aws rds wait db-instance-available \
            --db-instance-identifier ${{ env.RDS_IDENTIFIER }} \
            --region ${{ env.AWS_REGION }}
          echo "RDS is available"

      # ── Reset master password ────────────────────────
      - name: Generate new RDS password
        id: pass
        run: |
          PASSWORD=$(openssl rand -base64 32 | tr -d "=+/" | cut -c1-25)
          echo "::add-mask::$PASSWORD"
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT

      - name: Reset RDS master password
        run: |
          aws rds modify-db-instance \
            --db-instance-identifier ${{ env.RDS_IDENTIFIER }} \
            --master-user-password "${{ steps.pass.outputs.password }}" \
            --apply-immediately \
            --region ${{ env.AWS_REGION }}
          echo "Master password reset requested"

      - name: Wait for password change to apply
        run: |
          echo "Waiting for password modification..."
          sleep 15
          aws rds wait db-instance-available \
            --db-instance-identifier ${{ env.RDS_IDENTIFIER }} \
            --region ${{ env.AWS_REGION }}
          echo "Password change applied"

      # ── Build DATABASE_URL ───────────────────────────
      - name: Build DATABASE_URL
        id: db
        run: |
          DATABASE_URL="postgresql://${{ env.RDS_USERNAME }}:${{ steps.pass.outputs.password }}@${{ steps.rds.outputs.endpoint }}:5432/${{ env.RDS_DB_NAME }}?schema=public"
          echo "::add-mask::$DATABASE_URL"
          echo "database_url=$DATABASE_URL" >> $GITHUB_OUTPUT

      # ── Update K8s Secrets ───────────────────────────
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Generate NextAuth secret
        id: nextauth
        run: |
          SECRET=$(openssl rand -base64 32)
          echo "::add-mask::$SECRET"
          echo "secret=$SECRET" >> $GITHUB_OUTPUT

      - name: Update K8s secret
        run: |
          kubectl create secret generic kotvim-code-secrets \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --from-literal=DATABASE_URL="${{ steps.db.outputs.database_url }}" \
            --from-literal=NEXTAUTH_SECRET="${{ steps.nextauth.outputs.secret }}" \
            --from-literal=NEXTAUTH_URL="https://kotvim-code.luposec.io" \
            --from-literal=GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
            --from-literal=GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          echo "K8s secret updated"

      # ── Prisma Migrations ────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Prisma CLI
        run: npm install prisma@latest --no-save

      - name: Run Prisma DB Push
        run: |
          npx prisma db push --accept-data-loss --url "${{ steps.db.outputs.database_url }}"
          echo "Database schema pushed"

      # ── Restart Deployment ───────────────────────────
      - name: Restart deployment
        run: |
          kubectl -n ${{ env.K8S_NAMESPACE }} rollout restart deployment kotvim-code
          kubectl -n ${{ env.K8S_NAMESPACE }} rollout status deployment kotvim-code --timeout=120s
          echo "Deployment restarted"

      # ── Summary ──────────────────────────────────────
      - name: Job Summary
        run: |
          echo "## RDS Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **RDS Endpoint** | \`${{ steps.rds.outputs.endpoint }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Database** | \`${{ env.RDS_DB_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **K8s Secret** | \`kotvim-code-secrets\` updated |" >> $GITHUB_STEP_SUMMARY
          echo "| **Prisma** | Schema pushed |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deployment** | Restarted |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Verify auth at https://kotvim-code.luposec.io" >> $GITHUB_STEP_SUMMARY
          echo "2. Rotate Google OAuth client secret (leaked in previous logs)" >> $GITHUB_STEP_SUMMARY
