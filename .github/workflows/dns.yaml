name: DNS Setup

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: eu-west-1
  EKS_CLUSTER_NAME: pressto-prod
  DOMAIN: kotvim-code.luposec.io

jobs:
  setup-dns:
    runs-on: ubuntu-latest
    name: Setup Route 53 DNS

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure Route 53 IAM permissions
        run: |
          ROLE_NAME="kotvim-code-github-actions"
          aws iam put-role-policy \
            --role-name "$ROLE_NAME" \
            --policy-name "route53-access" \
            --policy-document '{
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Sid": "Route53HostedZones",
                  "Effect": "Allow",
                  "Action": [
                    "route53:CreateHostedZone",
                    "route53:GetHostedZone",
                    "route53:ListHostedZones",
                    "route53:ListHostedZonesByName",
                    "route53:ChangeResourceRecordSets",
                    "route53:ListResourceRecordSets",
                    "route53:GetChange"
                  ],
                  "Resource": "*"
                },
                {
                  "Sid": "ELBDescribe",
                  "Effect": "Allow",
                  "Action": [
                    "elasticloadbalancing:DescribeLoadBalancers"
                  ],
                  "Resource": "*"
                }
              ]
            }'
          echo "Route 53 IAM policy ensured"
          echo "Waiting 15s for IAM propagation..."
          sleep 15

      - name: Create Route 53 Hosted Zone
        id: r53
        run: |
          DOMAIN="${{ env.DOMAIN }}"

          # Check if hosted zone already exists
          ZONE_ID=$(aws route53 list-hosted-zones-by-name \
            --dns-name "$DOMAIN" \
            --query "HostedZones[?Name=='${DOMAIN}.'].Id" \
            --output text | head -1 | sed 's|/hostedzone/||')

          if [ -z "$ZONE_ID" ] || [ "$ZONE_ID" = "None" ]; then
            echo "Creating hosted zone for $DOMAIN..."
            RESULT=$(aws route53 create-hosted-zone \
              --name "$DOMAIN" \
              --caller-reference "kotvim-code-$(date +%s)" \
              --hosted-zone-config Comment="kotvim-code e-learning platform")

            ZONE_ID=$(echo "$RESULT" | jq -r '.HostedZone.Id' | sed 's|/hostedzone/||')
            echo "Created hosted zone: $ZONE_ID"
          else
            echo "Hosted zone already exists: $ZONE_ID"
          fi

          echo "zone_id=$ZONE_ID" >> $GITHUB_OUTPUT

          # Get NS records for Cloudflare delegation
          NS_RECORDS=$(aws route53 get-hosted-zone \
            --id "$ZONE_ID" \
            --query 'DelegationSet.NameServers' --output text)
          echo "============================================"
          echo "  Route 53 NS records (add to Cloudflare):"
          echo "============================================"
          echo "$NS_RECORDS" | tr '\t' '\n'
          echo "============================================"

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Get Ingress LB hostname
        id: ingress-lb
        run: |
          # Find the nginx ingress controller's external LB
          LB_HOSTNAME=$(kubectl get svc -A \
            -o jsonpath='{.items[?(@.spec.type=="LoadBalancer")].status.loadBalancer.ingress[0].hostname}' \
            2>/dev/null | awk '{print $1}')

          if [ -z "$LB_HOSTNAME" ]; then
            LB_HOSTNAME=$(kubectl get svc -n ingress-nginx \
              -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}' 2>/dev/null)
          fi

          if [ -z "$LB_HOSTNAME" ]; then
            echo "WARNING: Could not find ingress controller LB. Checking all namespaces..."
            kubectl get svc -A --field-selector spec.type=LoadBalancer
            exit 1
          fi

          echo "lb_hostname=$LB_HOSTNAME" >> $GITHUB_OUTPUT
          echo "Ingress LB: $LB_HOSTNAME"

      - name: Get ELB Hosted Zone ID
        id: elb-zone
        run: |
          LB_HOSTNAME="${{ steps.ingress-lb.outputs.lb_hostname }}"

          # Extract LB name from hostname (everything before first dot)
          LB_NAME=$(echo "$LB_HOSTNAME" | cut -d'.' -f1)

          # Try NLB/ALB first (elbv2)
          ELB_ZONE_ID=$(aws elbv2 describe-load-balancers \
            --region ${{ env.AWS_REGION }} \
            --query "LoadBalancers[?DNSName=='${LB_HOSTNAME}'].CanonicalHostedZoneId" \
            --output text 2>/dev/null)

          if [ -z "$ELB_ZONE_ID" ] || [ "$ELB_ZONE_ID" = "None" ]; then
            # Try classic ELB
            ELB_ZONE_ID=$(aws elb describe-load-balancers \
              --region ${{ env.AWS_REGION }} \
              --query "LoadBalancerDescriptions[?DNSName=='${LB_HOSTNAME}'].CanonicalHostedZoneNameID" \
              --output text 2>/dev/null)
          fi

          if [ -z "$ELB_ZONE_ID" ] || [ "$ELB_ZONE_ID" = "None" ]; then
            echo "Could not find ELB hosted zone ID, using eu-west-1 NLB default"
            ELB_ZONE_ID="Z2IFOLAFXWLO4F"
          fi

          echo "elb_zone_id=$ELB_ZONE_ID" >> $GITHUB_OUTPUT
          echo "ELB Hosted Zone ID: $ELB_ZONE_ID"

      - name: Create Route 53 DNS record
        run: |
          ZONE_ID="${{ steps.r53.outputs.zone_id }}"
          LB_HOSTNAME="${{ steps.ingress-lb.outputs.lb_hostname }}"
          DOMAIN="${{ env.DOMAIN }}"
          ELB_ZONE_ID="${{ steps.elb-zone.outputs.elb_zone_id }}"

          # Always use ALIAS record (zone apex doesn't support CNAME)
          aws route53 change-resource-record-sets \
            --hosted-zone-id "$ZONE_ID" \
            --change-batch '{
              "Changes": [{
                "Action": "UPSERT",
                "ResourceRecordSet": {
                  "Name": "'"$DOMAIN"'",
                  "Type": "A",
                  "AliasTarget": {
                    "HostedZoneId": "'"$ELB_ZONE_ID"'",
                    "DNSName": "'"$LB_HOSTNAME"'",
                    "EvaluateTargetHealth": true
                  }
                }
              }]
            }'
          echo "Created ALIAS A record: $DOMAIN -> $LB_HOSTNAME (ELB zone: $ELB_ZONE_ID)"

      - name: Summary
        run: |
          echo "============================================"
          echo "  DNS Setup Complete!"
          echo "============================================"
          echo "  Domain: ${{ env.DOMAIN }}"
          echo "  Zone ID: ${{ steps.r53.outputs.zone_id }}"
          echo "  LB: ${{ steps.ingress-lb.outputs.lb_hostname }}"
          echo ""
          echo "  NEXT: Add NS delegation in Cloudflare!"
          echo "  Create NS records for ${{ env.DOMAIN }}"
          echo "  pointing to the Route 53 name servers above."
          echo "============================================"
