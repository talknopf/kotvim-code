name: Update K8s Secrets

on:
  workflow_dispatch:
    inputs:
      google_client_id:
        description: 'Google OAuth Client ID'
        required: true
      google_client_secret:
        description: 'Google OAuth Client Secret'
        required: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-1
  EKS_CLUSTER_NAME: pressto-prod
  NAMESPACE: kotvim-code

jobs:
  update-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Patch K8s secret with Google OAuth credentials
        run: |
          echo "Patching kotvim-code-secrets with Google OAuth credentials..."
          
          kubectl patch secret kotvim-code-secrets -n ${{ env.NAMESPACE }} \
            -p "{\"stringData\":{\"GOOGLE_CLIENT_ID\":\"${{ inputs.google_client_id }}\",\"GOOGLE_CLIENT_SECRET\":\"${{ inputs.google_client_secret }}\"}}"
          
          echo "Secret patched successfully."

      - name: Restart deployment to pick up new secrets
        run: |
          kubectl rollout restart deployment/kotvim-code -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/kotvim-code -n ${{ env.NAMESPACE }} --timeout=120s
          echo "Deployment restarted and ready."

      - name: Verify pods are running
        run: kubectl get pods -n ${{ env.NAMESPACE }}
