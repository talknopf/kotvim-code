name: Update K8s Secrets

on:
  workflow_dispatch:
    inputs:
      database_url:
        description: 'PostgreSQL connection string (e.g. postgresql://user:pass@host:5432/db?schema=public)'
        required: false
      nextauth_secret:
        description: 'NextAuth secret (generate with: openssl rand -base64 32)'
        required: false
      google_client_id:
        description: 'Google OAuth Client ID'
        required: false
      google_client_secret:
        description: 'Google OAuth Client Secret'
        required: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-1
  EKS_CLUSTER_NAME: pressto-prod
  NAMESPACE: kotvim-code

jobs:
  update-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Build patch JSON
        id: patch
        run: |
          PATCH='{"stringData":{'
          FIRST=true

          if [ -n "${{ inputs.database_url }}" ]; then
            PATCH="${PATCH}\"DATABASE_URL\":\"${{ inputs.database_url }}\""
            FIRST=false
          fi

          if [ -n "${{ inputs.nextauth_secret }}" ]; then
            if [ "$FIRST" = false ]; then PATCH="${PATCH},"; fi
            PATCH="${PATCH}\"NEXTAUTH_SECRET\":\"${{ inputs.nextauth_secret }}\""
            FIRST=false
          fi

          if [ -n "${{ inputs.google_client_id }}" ]; then
            if [ "$FIRST" = false ]; then PATCH="${PATCH},"; fi
            PATCH="${PATCH}\"GOOGLE_CLIENT_ID\":\"${{ inputs.google_client_id }}\""
            FIRST=false
          fi

          if [ -n "${{ inputs.google_client_secret }}" ]; then
            if [ "$FIRST" = false ]; then PATCH="${PATCH},"; fi
            PATCH="${PATCH}\"GOOGLE_CLIENT_SECRET\":\"${{ inputs.google_client_secret }}\""
            FIRST=false
          fi

          PATCH="${PATCH}}}"

          if [ "$FIRST" = true ]; then
            echo "No secrets provided. Nothing to update."
            exit 1
          fi

          echo "patch=${PATCH}" >> $GITHUB_OUTPUT
          echo "Patching secrets (values redacted)..."

      - name: Patch K8s secret
        run: |
          kubectl patch secret kotvim-code-secrets -n ${{ env.NAMESPACE }} \
            -p '${{ steps.patch.outputs.patch }}'
          echo "Secret patched successfully."

      - name: Restart deployment to pick up new secrets
        run: |
          kubectl rollout restart deployment/kotvim-code -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/kotvim-code -n ${{ env.NAMESPACE }} --timeout=120s
          echo "Deployment restarted and ready."

      - name: Verify pods are running
        run: kubectl get pods -n ${{ env.NAMESPACE }}
