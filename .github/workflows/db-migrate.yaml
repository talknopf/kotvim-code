name: Database Migration

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Migration action'
        required: true
        default: 'push'
        type: choice
        options:
          - push
          - reset

env:
  AWS_REGION: eu-west-1
  EKS_CLUSTER_NAME: pressto-prod
  K8S_NAMESPACE: kotvim-code

permissions:
  id-token: write
  contents: read

jobs:
  migrate:
    name: Run Database Migration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Delete previous migration job
        run: kubectl delete job kotvim-code-db-migrate -n ${{ env.K8S_NAMESPACE }} --ignore-not-found

      - name: Read Prisma schema and create migration job
        run: |
          # Base64 encode the prisma schema so we can embed it in the job
          SCHEMA_B64=$(base64 -w0 prisma/schema.prisma)
          
          FORCE_RESET=""
          if [ "${{ inputs.action }}" = "reset" ]; then
            FORCE_RESET="--force-reset"
          fi

          cat <<EOF | kubectl apply -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: kotvim-code-db-migrate
            namespace: ${{ env.K8S_NAMESPACE }}
          spec:
            ttlSecondsAfterFinished: 300
            template:
              spec:
                containers:
                  - name: migrate
                    image: node:20-slim
                    command:
                      - /bin/sh
                      - -c
                      - |
                        echo "Installing prisma..."
                        npm install -g prisma@5 --no-fund --no-audit 2>&1
                        mkdir -p /app/prisma
                        echo "${SCHEMA_B64}" | base64 -d > /app/prisma/schema.prisma
                        cd /app
                        echo "Running prisma db push ${FORCE_RESET}..."
                        prisma db push --skip-generate ${FORCE_RESET}
                        echo "Migration complete!"
                    envFrom:
                      - secretRef:
                          name: kotvim-code-secrets
                restartPolicy: Never
            backoffLimit: 2
          EOF

      - name: Wait for migration to complete
        run: kubectl wait --for=condition=complete job/kotvim-code-db-migrate -n ${{ env.K8S_NAMESPACE }} --timeout=180s

      - name: Show migration logs
        if: always()
        run: |
          POD=$(kubectl get pods -n ${{ env.K8S_NAMESPACE }} -l job-name=kotvim-code-db-migrate --sort-by=.metadata.creationTimestamp -o jsonpath='{.items[-1].metadata.name}' 2>/dev/null || true)
          if [ -n "$POD" ]; then
            kubectl logs "$POD" -n ${{ env.K8S_NAMESPACE }} 2>/dev/null || echo "Could not fetch logs (RBAC may need pods/log permission)"
          else
            echo "No migration pod found"
          fi
