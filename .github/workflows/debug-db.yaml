name: Debug DB Connectivity

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: eu-west-1
  EKS_CLUSTER_NAME: pressto-prod
  K8S_NAMESPACE: kotvim-code
  RDS_IDENTIFIER: kotvim-code-db

jobs:
  debug:
    runs-on: ubuntu-latest
    name: Test DB connectivity from cluster

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Get RDS endpoint
        id: rds
        run: |
          ENDPOINT=$(aws rds describe-db-instances \
            --db-instance-identifier ${{ env.RDS_IDENTIFIER }} \
            --region ${{ env.AWS_REGION }} \
            --query 'DBInstances[0].Endpoint.Address' --output text)
          STATUS=$(aws rds describe-db-instances \
            --db-instance-identifier ${{ env.RDS_IDENTIFIER }} \
            --region ${{ env.AWS_REGION }} \
            --query 'DBInstances[0].DBInstanceStatus' --output text)
          echo "endpoint=$ENDPOINT" >> $GITHUB_OUTPUT
          echo "## RDS Status" >> $GITHUB_STEP_SUMMARY
          echo "- Endpoint: \`$ENDPOINT\`" >> $GITHUB_STEP_SUMMARY
          echo "- Status: \`$STATUS\`" >> $GITHUB_STEP_SUMMARY

      - name: Check pod status
        run: |
          echo "## Pod Status" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n ${{ env.K8S_NAMESPACE }} -o wide 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check K8s secret keys
        run: |
          echo "## Secret Keys" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get secret kotvim-code-secrets -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.data}' | python3 -c "
          import sys, json, base64
          data = json.loads(sys.stdin.read())
          for k, v in sorted(data.items()):
              decoded = base64.b64decode(v).decode()
              if k == 'DATABASE_URL':
                  parts = decoded.split('@')
                  if len(parts) == 2:
                      user_pass = parts[0].split(':')
                      if len(user_pass) >= 2:
                          print(f'{k} = {user_pass[0]}:****@{parts[1]}')
                      else:
                          print(f'{k} = (malformed)')
                  else:
                      print(f'{k} = (unexpected format, parts={len(parts)})')
              elif 'SECRET' in k or 'PASSWORD' in k:
                  print(f'{k} = SET (length={len(decoded)})')
              else:
                  print(f'{k} = {decoded[:80]}')
          " 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Test DB connection via K8s Job (results in ConfigMap)
        run: |
          kubectl delete job db-test-job -n ${{ env.K8S_NAMESPACE }} --ignore-not-found
          kubectl delete configmap db-test-result -n ${{ env.K8S_NAMESPACE }} --ignore-not-found

          # Pre-create an empty configmap so the Job can patch it
          kubectl create configmap db-test-result -n ${{ env.K8S_NAMESPACE }} --from-literal=result="pending"

          cat <<'JOBEOF' | kubectl apply -n ${{ env.K8S_NAMESPACE }} -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: db-test-job
          spec:
            ttlSecondsAfterFinished: 300
            backoffLimit: 0
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: test
                    image: node:20-slim
                    command:
                      - /bin/bash
                      - -c
                      - |
                        apt-get update -qq && apt-get install -y -qq curl > /dev/null 2>&1

                        OUTPUT=""
                        log() { OUTPUT="${OUTPUT}${1}\n"; echo "$1"; }

                        log "=== DATABASE_URL structure ==="
                        log "$(echo "$DATABASE_URL" | sed 's/:\/\/[^:]*:[^@]*@/:\/\/***:***@/')"
                        log ""

                        log "=== Installing pg ==="
                        INSTALL_OUT=$(npm install pg --no-save 2>&1 | tail -3)
                        log "$INSTALL_OUT"
                        log ""

                        log "=== Test 1: pg connection with original URL ==="
                        T1=$(node -e "
                        const { Pool } = require('pg');
                        const pool = new Pool({
                          connectionString: process.env.DATABASE_URL,
                          connectionTimeoutMillis: 10000
                        });
                        pool.query('SELECT NOW() as now, current_database() as db, current_user as usr')
                          .then(r => { console.log('SUCCESS: ' + JSON.stringify(r.rows[0])); return pool.end(); })
                          .catch(e => { console.log('FAILED: ' + e.message); return pool.end(); });
                        " 2>&1 || echo "node exited with error")
                        log "$T1"
                        log ""

                        log "=== Test 2: pg without ?schema=public ==="
                        CLEAN_URL=$(echo "$DATABASE_URL" | sed 's/\?schema=public//')
                        T2=$(CLEAN_DB_URL="$CLEAN_URL" node -e "
                        const { Pool } = require('pg');
                        const pool = new Pool({
                          connectionString: process.env.CLEAN_DB_URL,
                          connectionTimeoutMillis: 10000
                        });
                        pool.query('SELECT NOW() as now, current_database() as db')
                          .then(r => { console.log('SUCCESS: ' + JSON.stringify(r.rows[0])); return pool.end(); })
                          .catch(e => { console.log('FAILED: ' + e.message); return pool.end(); });
                        " 2>&1 || echo "node exited with error")
                        log "$T2"
                        log ""

                        log "=== Test 3: List tables ==="
                        T3=$(node -e "
                        const { Pool } = require('pg');
                        const pool = new Pool({
                          connectionString: process.env.DATABASE_URL,
                          connectionTimeoutMillis: 10000
                        });
                        pool.query(\"SELECT tablename FROM pg_tables WHERE schemaname='public'\")
                          .then(r => { console.log('Tables: ' + r.rows.map(r=>r.tablename).join(', ')); return pool.end(); })
                          .catch(e => { console.log('FAILED: ' + e.message); return pool.end(); });
                        " 2>&1 || echo "node exited with error")
                        log "$T3"
                        log ""
                        log "=== All tests complete ==="

                        # Write results to ConfigMap via K8s API
                        TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                        NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
                        CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt

                        ENCODED=$(printf '%s' "$OUTPUT" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))" 2>/dev/null || echo '"encoding-failed"')

                        PATCH_RESULT=$(curl -s -o /dev/null -w '%{http_code}' --cacert $CA \
                          -X PATCH \
                          -H "Authorization: Bearer $TOKEN" \
                          -H "Content-Type: application/merge-patch+json" \
                          "https://kubernetes.default.svc/api/v1/namespaces/$NS/configmaps/db-test-result" \
                          -d "{\"data\":{\"result\":$ENCODED}}")

                        echo "ConfigMap patch HTTP status: $PATCH_RESULT"
                        if [ "$PATCH_RESULT" != "200" ]; then
                          echo "Failed to write ConfigMap, trying fallback..."
                          # Write to a file that we can check
                          echo "$OUTPUT" > /tmp/result.txt
                          cat /tmp/result.txt
                        fi
                    env:
                      - name: DATABASE_URL
                        valueFrom:
                          secretKeyRef:
                            name: kotvim-code-secrets
                            key: DATABASE_URL
          JOBEOF

          echo "Waiting for Job to complete (max 120s)..."
          kubectl wait --for=condition=complete job/db-test-job \
            -n ${{ env.K8S_NAMESPACE }} --timeout=120s || {
            echo "Job did not complete in time or failed"
            kubectl describe job db-test-job -n ${{ env.K8S_NAMESPACE }} 2>/dev/null | tail -20 || true
          }

          echo ""
          echo "## DB Connection Test Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get configmap db-test-result -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.data.result}' 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          # Cleanup
          kubectl delete job db-test-job -n ${{ env.K8S_NAMESPACE }} --ignore-not-found
          kubectl delete configmap db-test-result -n ${{ env.K8S_NAMESPACE }} --ignore-not-found
