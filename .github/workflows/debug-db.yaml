name: Debug DB Connectivity

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: eu-west-1
  EKS_CLUSTER_NAME: pressto-prod
  K8S_NAMESPACE: kotvim-code
  RDS_IDENTIFIER: kotvim-code-db

jobs:
  debug:
    runs-on: ubuntu-latest
    name: Network & DB connectivity diagnostics

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Get EKS cluster details
        id: eks
        run: |
          CLUSTER_INFO=$(aws eks describe-cluster \
            --name ${{ env.EKS_CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }})

          VPC_ID=$(echo "$CLUSTER_INFO" | jq -r '.cluster.resourcesVpcConfig.vpcId')
          CLUSTER_SG=$(echo "$CLUSTER_INFO" | jq -r '.cluster.resourcesVpcConfig.clusterSecurityGroupId')
          SUBNET_IDS=$(echo "$CLUSTER_INFO" | jq -r '.cluster.resourcesVpcConfig.subnetIds | join(" ")')
          K8S_CIDR=$(echo "$CLUSTER_INFO" | jq -r '.cluster.kubernetesNetworkConfig.serviceIpv4Cidr // "unknown"')

          echo "vpc_id=$VPC_ID" >> $GITHUB_OUTPUT
          echo "cluster_sg=$CLUSTER_SG" >> $GITHUB_OUTPUT
          echo "subnet_ids=$SUBNET_IDS" >> $GITHUB_OUTPUT

          echo "## EKS Cluster" >> $GITHUB_STEP_SUMMARY
          echo "- VPC: \`$VPC_ID\`" >> $GITHUB_STEP_SUMMARY
          echo "- Cluster SG: \`$CLUSTER_SG\`" >> $GITHUB_STEP_SUMMARY
          echo "- K8s Service CIDR: \`$K8S_CIDR\`" >> $GITHUB_STEP_SUMMARY
          echo "- Subnets: \`$SUBNET_IDS\`" >> $GITHUB_STEP_SUMMARY

      - name: Check ALL VPC CIDRs (primary + secondary)
        id: vpc
        run: |
          VPC_ID="${{ steps.eks.outputs.vpc_id }}"

          echo "## VPC CIDRs" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          aws ec2 describe-vpcs --vpc-ids "$VPC_ID" \
            --region ${{ env.AWS_REGION }} \
            --query 'Vpcs[0].CidrBlockAssociationSet[*].{CIDR:CidrBlock,State:CidrBlockState.State}' \
            --output table 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          # Get primary CIDR
          PRIMARY_CIDR=$(aws ec2 describe-vpcs --vpc-ids "$VPC_ID" \
            --region ${{ env.AWS_REGION }} \
            --query 'Vpcs[0].CidrBlock' --output text)
          echo "primary_cidr=$PRIMARY_CIDR" >> $GITHUB_OUTPUT

          # Get ALL CIDRs
          ALL_CIDRS=$(aws ec2 describe-vpcs --vpc-ids "$VPC_ID" \
            --region ${{ env.AWS_REGION }} \
            --query 'Vpcs[0].CidrBlockAssociationSet[*].CidrBlock' --output text)
          echo "all_cidrs=$ALL_CIDRS" >> $GITHUB_OUTPUT
          echo "All VPC CIDRs: $ALL_CIDRS"

      - name: Get RDS details
        id: rds
        run: |
          RDS_INFO=$(aws rds describe-db-instances \
            --db-instance-identifier ${{ env.RDS_IDENTIFIER }} \
            --region ${{ env.AWS_REGION }} \
            --query 'DBInstances[0]')

          ENDPOINT=$(echo "$RDS_INFO" | jq -r '.Endpoint.Address')
          STATUS=$(echo "$RDS_INFO" | jq -r '.DBInstanceStatus')
          RDS_SG_IDS=$(echo "$RDS_INFO" | jq -r '.VpcSecurityGroups[].VpcSecurityGroupId')
          RDS_SUBNET_GROUP=$(echo "$RDS_INFO" | jq -r '.DBSubnetGroup.DBSubnetGroupName')
          RDS_SUBNETS=$(echo "$RDS_INFO" | jq -r '.DBSubnetGroup.Subnets[].SubnetIdentifier')
          RDS_AZ=$(echo "$RDS_INFO" | jq -r '.AvailabilityZone')

          echo "endpoint=$ENDPOINT" >> $GITHUB_OUTPUT
          echo "sg_ids=$RDS_SG_IDS" >> $GITHUB_OUTPUT
          echo "rds_subnets=$RDS_SUBNETS" >> $GITHUB_OUTPUT

          echo "## RDS Instance" >> $GITHUB_STEP_SUMMARY
          echo "- Endpoint: \`$ENDPOINT\`" >> $GITHUB_STEP_SUMMARY
          echo "- Status: \`$STATUS\`" >> $GITHUB_STEP_SUMMARY
          echo "- AZ: \`$RDS_AZ\`" >> $GITHUB_STEP_SUMMARY
          echo "- Security Groups: \`$RDS_SG_IDS\`" >> $GITHUB_STEP_SUMMARY
          echo "- Subnet Group: \`$RDS_SUBNET_GROUP\`" >> $GITHUB_STEP_SUMMARY
          echo "- Subnets: \`$(echo $RDS_SUBNETS | tr '\n' ' ')\`" >> $GITHUB_STEP_SUMMARY

      - name: Check RDS Security Group rules (CRITICAL)
        run: |
          echo "## RDS Security Group Rules" >> $GITHUB_STEP_SUMMARY
          for SG_ID in ${{ steps.rds.outputs.sg_ids }}; do
            echo "### SG: $SG_ID" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            aws ec2 describe-security-groups --group-ids "$SG_ID" \
              --region ${{ env.AWS_REGION }} \
              --query 'SecurityGroups[0].IpPermissions' \
              --output json 2>&1 | tee -a $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          done

      - name: Check EKS node security groups (outbound rules)
        run: |
          VPC_ID="${{ steps.eks.outputs.vpc_id }}"
          CLUSTER_SG="${{ steps.eks.outputs.cluster_sg }}"

          echo "## EKS Cluster SG Outbound Rules ($CLUSTER_SG)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          aws ec2 describe-security-groups --group-ids "$CLUSTER_SG" \
            --region ${{ env.AWS_REGION }} \
            --query 'SecurityGroups[0].IpPermissionsEgress' \
            --output json 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          # Also check node-specific SGs
          echo "## All SGs in VPC with 'eks' or 'node' in name" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          aws ec2 describe-security-groups \
            --filters "Name=vpc-id,Values=$VPC_ID" \
            --region ${{ env.AWS_REGION }} \
            --query 'SecurityGroups[*].{ID:GroupId,Name:GroupName}' \
            --output table 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check pod IPs vs VPC CIDRs
        run: |
          echo "## Pod IPs" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n ${{ env.K8S_NAMESPACE }} -o wide 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pod IPs vs VPC CIDRs" >> $GITHUB_STEP_SUMMARY

          POD_IPS=$(kubectl get pods -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.items[*].status.podIP}')
          NODE_IPS=$(kubectl get pods -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.items[*].status.hostIP}')
          echo "- Pod IPs: \`$POD_IPS\`" >> $GITHUB_STEP_SUMMARY
          echo "- Node IPs: \`$NODE_IPS\`" >> $GITHUB_STEP_SUMMARY
          echo "- VPC CIDRs: \`${{ steps.vpc.outputs.all_cidrs }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Primary VPC CIDR: \`${{ steps.vpc.outputs.primary_cidr }}\`" >> $GITHUB_STEP_SUMMARY

          # Check if pod IPs fall within any VPC CIDR
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Analysis**: If pod IPs are NOT in any VPC CIDR, the SG rule allowing VPC CIDR won't match pod traffic." >> $GITHUB_STEP_SUMMARY

          # Check node SGs too
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Node Security Groups" >> $GITHUB_STEP_SUMMARY
          for NODE in $(kubectl get pods -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.items[*].spec.nodeName}' | tr ' ' '\n' | sort -u); do
            INSTANCE_ID=$(kubectl get node "$NODE" -o jsonpath='{.spec.providerID}' | awk -F/ '{print $NF}')
            echo "- Node \`$NODE\` → Instance \`$INSTANCE_ID\`" >> $GITHUB_STEP_SUMMARY
            if [ -n "$INSTANCE_ID" ] && [ "$INSTANCE_ID" != "" ]; then
              NODE_SGS=$(aws ec2 describe-instances --instance-ids "$INSTANCE_ID" \
                --region ${{ env.AWS_REGION }} \
                --query 'Reservations[0].Instances[0].SecurityGroups[*].{ID:GroupId,Name:GroupName}' \
                --output json 2>/dev/null || echo "could not describe instance")
              echo "  SGs: \`$NODE_SGS\`" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Check NACLs on RDS subnets
        run: |
          echo "## Network ACLs on RDS Subnets" >> $GITHUB_STEP_SUMMARY
          for SUBNET in ${{ steps.rds.outputs.rds_subnets }}; do
            NACL_ID=$(aws ec2 describe-network-acls \
              --filters "Name=association.subnet-id,Values=$SUBNET" \
              --region ${{ env.AWS_REGION }} \
              --query 'NetworkAcls[0].NetworkAclId' --output text 2>/dev/null)
            echo "### Subnet $SUBNET → NACL $NACL_ID" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            aws ec2 describe-network-acls --network-acl-ids "$NACL_ID" \
              --region ${{ env.AWS_REGION }} \
              --query 'NetworkAcls[0].Entries' \
              --output json 2>&1 | tee -a $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          done

      - name: Check route tables for RDS subnets
        run: |
          echo "## Route Tables for RDS Subnets" >> $GITHUB_STEP_SUMMARY
          for SUBNET in ${{ steps.rds.outputs.rds_subnets }}; do
            RT_ID=$(aws ec2 describe-route-tables \
              --filters "Name=association.subnet-id,Values=$SUBNET" \
              --region ${{ env.AWS_REGION }} \
              --query 'RouteTables[0].RouteTableId' --output text 2>/dev/null)
            if [ "$RT_ID" = "None" ] || [ -z "$RT_ID" ]; then
              RT_ID="(using VPC main route table)"
            fi
            echo "### Subnet $SUBNET → RT $RT_ID" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            if [ "$RT_ID" != "(using VPC main route table)" ]; then
              aws ec2 describe-route-tables --route-table-ids "$RT_ID" \
                --region ${{ env.AWS_REGION }} \
                --query 'RouteTables[0].Routes' \
                --output json 2>&1 | tee -a $GITHUB_STEP_SUMMARY
            else
              # Get main route table
              VPC_ID="${{ steps.eks.outputs.vpc_id }}"
              aws ec2 describe-route-tables \
                --filters "Name=vpc-id,Values=$VPC_ID" "Name=association.main,Values=true" \
                --region ${{ env.AWS_REGION }} \
                --query 'RouteTables[0].Routes' \
                --output json 2>&1 | tee -a $GITHUB_STEP_SUMMARY
            fi
            echo '```' >> $GITHUB_STEP_SUMMARY
          done

      - name: Check K8s NetworkPolicies
        run: |
          echo "## Kubernetes NetworkPolicies" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get networkpolicies -n ${{ env.K8S_NAMESPACE }} -o yaml 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Cluster-wide NetworkPolicies" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get networkpolicies -A 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: DNS resolution test from pod
        run: |
          RDS_HOST="${{ steps.rds.outputs.endpoint }}"
          echo "## DNS + TCP test from inside cluster" >> $GITHUB_STEP_SUMMARY

          # Run a quick pod to test DNS and TCP connectivity
          kubectl delete pod net-debug -n ${{ env.K8S_NAMESPACE }} --ignore-not-found 2>/dev/null
          kubectl run net-debug -n ${{ env.K8S_NAMESPACE }} \
            --image=busybox:1.36 \
            --restart=Never \
            --command -- sleep 60

          echo "Waiting for net-debug pod to be ready..."
          kubectl wait --for=condition=Ready pod/net-debug \
            -n ${{ env.K8S_NAMESPACE }} --timeout=30s

          echo '```' >> $GITHUB_STEP_SUMMARY

          # DNS resolution
          echo "=== DNS Resolution ===" | tee -a $GITHUB_STEP_SUMMARY
          kubectl exec net-debug -n ${{ env.K8S_NAMESPACE }} -- \
            nslookup "$RDS_HOST" 2>&1 | tee -a $GITHUB_STEP_SUMMARY

          echo "" | tee -a $GITHUB_STEP_SUMMARY

          # TCP connectivity test with timeout
          echo "=== TCP Connect to $RDS_HOST:5432 (5s timeout) ===" | tee -a $GITHUB_STEP_SUMMARY
          kubectl exec net-debug -n ${{ env.K8S_NAMESPACE }} -- \
            sh -c "nc -z -w 5 $RDS_HOST 5432 && echo 'TCP CONNECT SUCCESS' || echo 'TCP CONNECT FAILED'" \
            2>&1 | tee -a $GITHUB_STEP_SUMMARY

          echo "" | tee -a $GITHUB_STEP_SUMMARY

          # Check what IP the pod has
          echo "=== Pod network info ===" | tee -a $GITHUB_STEP_SUMMARY
          kubectl exec net-debug -n ${{ env.K8S_NAMESPACE }} -- \
            sh -c "ip addr show 2>/dev/null || ifconfig 2>/dev/null || echo 'no ip tools'" \
            2>&1 | tee -a $GITHUB_STEP_SUMMARY

          echo '```' >> $GITHUB_STEP_SUMMARY

          # Cleanup
          kubectl delete pod net-debug -n ${{ env.K8S_NAMESPACE }} --ignore-not-found

      - name: Final summary
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Diagnostic Checklist" >> $GITHUB_STEP_SUMMARY
          echo "1. Are pod IPs within VPC CIDRs? (if not, SG CIDR rule won't work)" >> $GITHUB_STEP_SUMMARY
          echo "2. Does RDS SG allow traffic from node SGs? (check source SG references)" >> $GITHUB_STEP_SUMMARY
          echo "3. Are NACLs blocking port 5432? (check both inbound AND outbound)" >> $GITHUB_STEP_SUMMARY
          echo "4. Do route tables have routes for pod CIDR ranges?" >> $GITHUB_STEP_SUMMARY
          echo "5. Any K8s NetworkPolicies restricting egress?" >> $GITHUB_STEP_SUMMARY
          echo "6. Does nc TCP test succeed from a debug pod?" >> $GITHUB_STEP_SUMMARY
