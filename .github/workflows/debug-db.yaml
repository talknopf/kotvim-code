name: Debug DB Connectivity

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: eu-west-1
  EKS_CLUSTER_NAME: pressto-prod
  K8S_NAMESPACE: kotvim-code
  RDS_IDENTIFIER: kotvim-code-db

jobs:
  debug:
    runs-on: ubuntu-latest
    name: Test DB connectivity from cluster

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Grant pods/log RBAC permission
        run: |
          # Get the current user ARN for the RoleBinding subject
          CALLER=$(aws sts get-caller-identity --query Arn --output text)
          echo "Current identity: $CALLER"

          # Create a Role that allows reading pod logs
          cat <<'EOF' | kubectl apply -n ${{ env.K8S_NAMESPACE }} -f -
          apiVersion: rbac.authorization.k8s.io/v1
          kind: Role
          metadata:
            name: pod-log-reader
          rules:
            - apiGroups: [""]
              resources: ["pods/log"]
              verbs: ["get", "list"]
          EOF

          # Bind it to the GitHub Actions group (all authenticated users via OIDC)
          cat <<'EOF' | kubectl apply -n ${{ env.K8S_NAMESPACE }} -f -
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata:
            name: github-actions-pod-logs
          subjects:
            - kind: Group
              name: system:authenticated
              apiGroup: rbac.authorization.k8s.io
          roleRef:
            kind: Role
            name: pod-log-reader
            apiGroup: rbac.authorization.k8s.io
          EOF
          echo "RBAC for pods/log granted"

      - name: Get RDS endpoint
        id: rds
        run: |
          ENDPOINT=$(aws rds describe-db-instances \
            --db-instance-identifier ${{ env.RDS_IDENTIFIER }} \
            --region ${{ env.AWS_REGION }} \
            --query 'DBInstances[0].Endpoint.Address' --output text)
          STATUS=$(aws rds describe-db-instances \
            --db-instance-identifier ${{ env.RDS_IDENTIFIER }} \
            --region ${{ env.AWS_REGION }} \
            --query 'DBInstances[0].DBInstanceStatus' --output text)
          echo "endpoint=$ENDPOINT" >> $GITHUB_OUTPUT
          echo "## RDS Status" >> $GITHUB_STEP_SUMMARY
          echo "- Endpoint: \`$ENDPOINT\`" >> $GITHUB_STEP_SUMMARY
          echo "- Status: \`$STATUS\`" >> $GITHUB_STEP_SUMMARY

      - name: Check pod status
        run: |
          echo "## Pod Status" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n ${{ env.K8S_NAMESPACE }} -o wide 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check K8s secret keys
        run: |
          echo "## Secret Keys" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get secret kotvim-code-secrets -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.data}' | python3 -c "
          import sys, json, base64
          data = json.loads(sys.stdin.read())
          for k, v in sorted(data.items()):
              decoded = base64.b64decode(v).decode()
              if k == 'DATABASE_URL':
                  parts = decoded.split('@')
                  if len(parts) == 2:
                      user_pass = parts[0].split(':')
                      if len(user_pass) >= 2:
                          print(f'{k} = {user_pass[0]}:****@{parts[1]}')
                      else:
                          print(f'{k} = (malformed)')
                  else:
                      print(f'{k} = (unexpected format, parts={len(parts)})')
              elif 'SECRET' in k or 'PASSWORD' in k:
                  print(f'{k} = SET (length={len(decoded)})')
              else:
                  print(f'{k} = {decoded[:80]}')
          " 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Test DB connection via K8s Job
        run: |
          kubectl delete job db-test-job -n ${{ env.K8S_NAMESPACE }} --ignore-not-found
          cat <<'JOBEOF' | kubectl apply -n ${{ env.K8S_NAMESPACE }} -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: db-test-job
          spec:
            ttlSecondsAfterFinished: 300
            backoffLimit: 0
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: test
                    image: node:20-slim
                    command:
                      - /bin/bash
                      - -c
                      - |
                        echo "=== DATABASE_URL structure ==="
                        echo "$DATABASE_URL" | sed 's/:\/\/[^:]*:[^@]*@/:\/\/***:***@/'
                        echo ""

                        echo "=== Installing pg ==="
                        npm install pg --no-save 2>&1 | tail -3
                        echo ""

                        echo "=== Test 1: pg connection with original URL ==="
                        node -e "
                        const { Pool } = require('pg');
                        const pool = new Pool({
                          connectionString: process.env.DATABASE_URL,
                          connectionTimeoutMillis: 10000
                        });
                        pool.query('SELECT NOW() as now, current_database() as db, current_user as usr')
                          .then(r => { console.log('SUCCESS:', JSON.stringify(r.rows[0])); return pool.end(); })
                          .catch(e => { console.log('FAILED:', e.message); return pool.end(); });
                        " || true
                        echo ""

                        echo "=== Test 2: pg connection WITHOUT ?schema=public ==="
                        CLEAN_URL=$(echo "$DATABASE_URL" | sed 's/\?schema=public//')
                        node -e "
                        const { Pool } = require('pg');
                        const pool = new Pool({
                          connectionString: '$CLEAN_URL'.replace(/'/g,''),
                          connectionTimeoutMillis: 10000
                        });
                        pool.query('SELECT NOW() as now, current_database() as db')
                          .then(r => { console.log('SUCCESS:', JSON.stringify(r.rows[0])); return pool.end(); })
                          .catch(e => { console.log('FAILED:', e.message); return pool.end(); });
                        " || true
                        echo ""

                        echo "=== Test 3: pg connection with SSL rejectUnauthorized=false ==="
                        node -e "
                        const { Pool } = require('pg');
                        const pool = new Pool({
                          connectionString: process.env.DATABASE_URL,
                          connectionTimeoutMillis: 10000,
                          ssl: { rejectUnauthorized: false }
                        });
                        pool.query('SELECT 1 as ok')
                          .then(r => { console.log('SSL SUCCESS:', JSON.stringify(r.rows[0])); return pool.end(); })
                          .catch(e => { console.log('SSL FAILED:', e.message); return pool.end(); });
                        " || true
                        echo ""

                        echo "=== Test 4: List tables ==="
                        node -e "
                        const { Pool } = require('pg');
                        const pool = new Pool({
                          connectionString: process.env.DATABASE_URL,
                          connectionTimeoutMillis: 10000
                        });
                        pool.query(\"SELECT tablename FROM pg_tables WHERE schemaname='public'\")
                          .then(r => { console.log('Tables:', r.rows.map(r=>r.tablename).join(', ')); return pool.end(); })
                          .catch(e => { console.log('FAILED:', e.message); return pool.end(); });
                        " || true
                        echo ""
                        echo "=== All tests complete ==="
                    env:
                      - name: DATABASE_URL
                        valueFrom:
                          secretKeyRef:
                            name: kotvim-code-secrets
                            key: DATABASE_URL
          JOBEOF

          echo "Waiting for Job to complete (max 90s)..."
          kubectl wait --for=condition=complete job/db-test-job \
            -n ${{ env.K8S_NAMESPACE }} --timeout=90s || {
            echo "Job did not complete in time or failed"
            kubectl describe job db-test-job -n ${{ env.K8S_NAMESPACE }} 2>/dev/null | tail -20 || true
          }

          echo "## DB Connection Test Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl logs job/db-test-job -n ${{ env.K8S_NAMESPACE }} 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          kubectl delete job db-test-job -n ${{ env.K8S_NAMESPACE }} --ignore-not-found

      - name: Get app pod logs
        run: |
          echo "## App Pod Logs (last 50 lines)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          POD=$(kubectl get pods -n ${{ env.K8S_NAMESPACE }} -l app=kotvim-code -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
          if [ -n "$POD" ]; then
            kubectl logs "$POD" -n ${{ env.K8S_NAMESPACE }} --tail=50 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          else
            echo "No app pods found" | tee -a $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY
