name: Debug DB Connectivity

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: eu-west-1
  EKS_CLUSTER_NAME: pressto-prod
  K8S_NAMESPACE: kotvim-code
  RDS_IDENTIFIER: kotvim-code-db

jobs:
  debug:
    runs-on: ubuntu-latest
    name: Test DB connectivity from cluster

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Get RDS endpoint
        id: rds
        run: |
          ENDPOINT=$(aws rds describe-db-instances \
            --db-instance-identifier ${{ env.RDS_IDENTIFIER }} \
            --region ${{ env.AWS_REGION }} \
            --query 'DBInstances[0].Endpoint.Address' --output text)
          STATUS=$(aws rds describe-db-instances \
            --db-instance-identifier ${{ env.RDS_IDENTIFIER }} \
            --region ${{ env.AWS_REGION }} \
            --query 'DBInstances[0].DBInstanceStatus' --output text)
          echo "endpoint=$ENDPOINT" >> $GITHUB_OUTPUT
          echo "## RDS Status" >> $GITHUB_STEP_SUMMARY
          echo "- Endpoint: \`$ENDPOINT\`" >> $GITHUB_STEP_SUMMARY
          echo "- Status: \`$STATUS\`" >> $GITHUB_STEP_SUMMARY

      - name: Check pod status
        run: |
          echo "## Pod Status" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n ${{ env.K8S_NAMESPACE }} -o wide 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check K8s secret keys
        run: |
          echo "## Secret Keys" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get secret kotvim-code-secrets -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.data}' | python3 -c "
          import sys, json, base64
          data = json.loads(sys.stdin.read())
          for k, v in sorted(data.items()):
              decoded = base64.b64decode(v).decode()
              if k == 'DATABASE_URL':
                  parts = decoded.split('@')
                  if len(parts) == 2:
                      user_pass = parts[0].split(':')
                      if len(user_pass) >= 2:
                          print(f'{k} = {user_pass[0]}:****@{parts[1]}')
                      else:
                          print(f'{k} = (malformed)')
                  else:
                      print(f'{k} = (unexpected format, parts={len(parts)})')
              elif 'SECRET' in k or 'PASSWORD' in k:
                  print(f'{k} = SET (length={len(decoded)})')
              else:
                  print(f'{k} = {decoded[:80]}')
          " 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Test DB connection via Job (writes result to ConfigMap)
        run: |
          # Clean up from previous runs
          kubectl delete job db-test-job -n ${{ env.K8S_NAMESPACE }} --ignore-not-found
          kubectl delete configmap db-test-result -n ${{ env.K8S_NAMESPACE }} --ignore-not-found

          # Create a ServiceAccount-based RBAC so the Job can write a ConfigMap
          cat <<'EOF' | kubectl apply -n ${{ env.K8S_NAMESPACE }} -f -
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: db-tester
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: Role
          metadata:
            name: db-tester-role
          rules:
            - apiGroups: [""]
              resources: ["configmaps"]
              verbs: ["create", "get", "update", "patch"]
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata:
            name: db-tester-binding
          subjects:
            - kind: ServiceAccount
              name: db-tester
          roleRef:
            kind: Role
            name: db-tester-role
            apiGroup: rbac.authorization.k8s.io
          EOF

          # Create the test Job
          cat <<'JOBEOF' | kubectl apply -n ${{ env.K8S_NAMESPACE }} -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: db-test-job
          spec:
            ttlSecondsAfterFinished: 300
            backoffLimit: 0
            template:
              spec:
                serviceAccountName: db-tester
                restartPolicy: Never
                containers:
                  - name: test
                    image: node:20-slim
                    command:
                      - /bin/bash
                      - -c
                      - |
                        apt-get update -qq && apt-get install -y -qq curl > /dev/null 2>&1

                        RESULT=""
                        add() { RESULT="$RESULT$1\n"; }

                        add "=== DATABASE_URL structure ==="
                        add "$(echo "$DATABASE_URL" | sed 's/:\/\/[^:]*:[^@]*@/:\/\/***:***@/')"
                        add ""

                        add "=== Installing pg ==="
                        npm install pg --no-save 2>&1 | tail -3
                        add ""

                        add "=== Testing pg connection (10s timeout) ==="
                        PG_RESULT=$(node -e "
                        const { Pool } = require('pg');
                        const pool = new Pool({
                          connectionString: process.env.DATABASE_URL,
                          connectionTimeoutMillis: 10000,
                          ssl: false
                        });
                        pool.query('SELECT NOW() as now, current_database() as db, current_user as usr')
                          .then(r => { console.log('SUCCESS: ' + JSON.stringify(r.rows[0])); pool.end(); })
                          .catch(e => { console.log('FAILED: ' + e.message); pool.end(); process.exit(1); });
                        " 2>&1)
                        add "$PG_RESULT"
                        add ""

                        add "=== Testing pg connection WITHOUT ?schema=public ==="
                        CLEAN_URL=$(echo "$DATABASE_URL" | sed 's/\?schema=public//')
                        PG_RESULT2=$(DATABASE_URL="$CLEAN_URL" node -e "
                        const { Pool } = require('pg');
                        const pool = new Pool({
                          connectionString: process.env.DATABASE_URL,
                          connectionTimeoutMillis: 10000,
                          ssl: false
                        });
                        pool.query('SELECT NOW() as now, current_database() as db')
                          .then(r => { console.log('SUCCESS: ' + JSON.stringify(r.rows[0])); pool.end(); })
                          .catch(e => { console.log('FAILED: ' + e.message); pool.end(); process.exit(1); });
                        " 2>&1)
                        add "$PG_RESULT2"
                        add ""

                        add "=== Testing with SSL ==="
                        PG_RESULT3=$(node -e "
                        const { Pool } = require('pg');
                        const pool = new Pool({
                          connectionString: process.env.DATABASE_URL,
                          connectionTimeoutMillis: 10000,
                          ssl: { rejectUnauthorized: false }
                        });
                        pool.query('SELECT 1 as ok')
                          .then(r => { console.log('SSL SUCCESS: ' + JSON.stringify(r.rows[0])); pool.end(); })
                          .catch(e => { console.log('SSL FAILED: ' + e.message); pool.end(); });
                        " 2>&1)
                        add "$PG_RESULT3"
                        add ""

                        add "=== Listing tables ==="
                        TABLES=$(node -e "
                        const { Pool } = require('pg');
                        const pool = new Pool({
                          connectionString: process.env.DATABASE_URL,
                          connectionTimeoutMillis: 10000,
                          ssl: false
                        });
                        pool.query(\"SELECT tablename FROM pg_tables WHERE schemaname='public'\")
                          .then(r => { console.log(r.rows.map(r=>r.tablename).join(', ')); pool.end(); })
                          .catch(e => { console.log('FAILED: ' + e.message); pool.end(); });
                        " 2>&1)
                        add "$TABLES"
                        add ""
                        add "=== Done ==="

                        # Write result to a ConfigMap via K8s API
                        TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                        NAMESPACE=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
                        CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt

                        # JSON-encode the result
                        ENCODED=$(printf '%s' "$RESULT" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))" 2>/dev/null || echo "\"encoding failed\"")

                        curl -s --cacert $CA \
                          -X POST \
                          -H "Authorization: Bearer $TOKEN" \
                          -H "Content-Type: application/json" \
                          "https://kubernetes.default.svc/api/v1/namespaces/$NAMESPACE/configmaps" \
                          -d "{\"apiVersion\":\"v1\",\"kind\":\"ConfigMap\",\"metadata\":{\"name\":\"db-test-result\"},\"data\":{\"result\":$ENCODED}}"

                        echo "Results written to ConfigMap db-test-result"
                    env:
                      - name: DATABASE_URL
                        valueFrom:
                          secretKeyRef:
                            name: kotvim-code-secrets
                            key: DATABASE_URL
          JOBEOF

          echo "Waiting for Job to complete (max 120s)..."
          kubectl wait --for=condition=complete job/db-test-job \
            -n ${{ env.K8S_NAMESPACE }} --timeout=120s || {
            echo "Job did not complete in time"
            kubectl get job db-test-job -n ${{ env.K8S_NAMESPACE }} -o yaml 2>/dev/null | grep -A5 "status:" || true
          }

          echo "## DB Connection Test Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get configmap db-test-result -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.data.result}' 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          # Cleanup
          kubectl delete job db-test-job -n ${{ env.K8S_NAMESPACE }} --ignore-not-found
          kubectl delete configmap db-test-result -n ${{ env.K8S_NAMESPACE }} --ignore-not-found
          kubectl delete serviceaccount db-tester -n ${{ env.K8S_NAMESPACE }} --ignore-not-found
          kubectl delete role db-tester-role -n ${{ env.K8S_NAMESPACE }} --ignore-not-found
          kubectl delete rolebinding db-tester-binding -n ${{ env.K8S_NAMESPACE }} --ignore-not-found

      - name: Get app pod logs
        run: |
          echo "## App Pod Logs (last 50 lines)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          POD=$(kubectl get pods -n ${{ env.K8S_NAMESPACE }} -l app=kotvim-code -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
          if [ -n "$POD" ]; then
            kubectl logs "$POD" -n ${{ env.K8S_NAMESPACE }} --tail=50 2>&1 | tee -a $GITHUB_STEP_SUMMARY || echo "Could not get app logs (RBAC?)"
          else
            echo "No app pods found" | tee -a $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY
