name: Debug DB Connectivity

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: eu-west-1
  EKS_CLUSTER_NAME: pressto-prod
  K8S_NAMESPACE: kotvim-code
  RDS_IDENTIFIER: kotvim-code-db

jobs:
  debug:
    runs-on: ubuntu-latest
    name: Test DB connectivity from cluster

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Get RDS endpoint
        id: rds
        run: |
          ENDPOINT=$(aws rds describe-db-instances \
            --db-instance-identifier ${{ env.RDS_IDENTIFIER }} \
            --region ${{ env.AWS_REGION }} \
            --query 'DBInstances[0].Endpoint.Address' --output text)
          STATUS=$(aws rds describe-db-instances \
            --db-instance-identifier ${{ env.RDS_IDENTIFIER }} \
            --region ${{ env.AWS_REGION }} \
            --query 'DBInstances[0].DBInstanceStatus' --output text)
          echo "endpoint=$ENDPOINT" >> $GITHUB_OUTPUT
          echo "## RDS Status" >> $GITHUB_STEP_SUMMARY
          echo "- Endpoint: \`$ENDPOINT\`" >> $GITHUB_STEP_SUMMARY
          echo "- Status: \`$STATUS\`" >> $GITHUB_STEP_SUMMARY

      - name: Check pod status
        run: |
          echo "## Pod Status" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n ${{ env.K8S_NAMESPACE }} -o wide 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Pod Describe" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl describe pods -n ${{ env.K8S_NAMESPACE }} -l app=kotvim-code 2>&1 | tail -80 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check K8s secret keys
        run: |
          echo "## Secret Keys" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get secret kotvim-code-secrets -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.data}' | python3 -c "
          import sys, json, base64
          data = json.loads(sys.stdin.read())
          for k, v in sorted(data.items()):
              decoded = base64.b64decode(v).decode()
              if k == 'DATABASE_URL':
                  parts = decoded.split('@')
                  if len(parts) == 2:
                      user_pass = parts[0].split(':')
                      if len(user_pass) >= 2:
                          print(f'{k} = {user_pass[0]}:****@{parts[1]}')
                      else:
                          print(f'{k} = (malformed)')
                  else:
                      print(f'{k} = (unexpected format, parts={len(parts)})')
              elif 'SECRET' in k or 'PASSWORD' in k:
                  print(f'{k} = SET (length={len(decoded)})')
              else:
                  print(f'{k} = {decoded[:80]}')
          " 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Test TCP connectivity to RDS from cluster
        run: |
          kubectl delete pod db-tcp-test -n ${{ env.K8S_NAMESPACE }} --ignore-not-found
          cat <<EOF | kubectl apply -n ${{ env.K8S_NAMESPACE }} -f -
          apiVersion: v1
          kind: Pod
          metadata:
            name: db-tcp-test
          spec:
            restartPolicy: Never
            containers:
              - name: test
                image: busybox:1.36
                command:
                  - /bin/sh
                  - -c
                  - |
                    echo "=== DNS Resolution ==="
                    nslookup ${{ steps.rds.outputs.endpoint }} || echo "DNS FAILED"
                    echo ""
                    echo "=== TCP Connection Test (port 5432) ==="
                    nc -zv -w 5 ${{ steps.rds.outputs.endpoint }} 5432 && echo "TCP OK" || echo "TCP FAILED"
                    echo ""
                    echo "=== Done ==="
          EOF
          echo "Waiting for TCP test pod..."
          kubectl wait --for=condition=Ready pod/db-tcp-test -n ${{ env.K8S_NAMESPACE }} --timeout=30s 2>/dev/null || true
          sleep 10
          echo "## TCP Connectivity Test" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl logs db-tcp-test -n ${{ env.K8S_NAMESPACE }} 2>&1 | tee -a $GITHUB_STEP_SUMMARY || echo "Could not get logs"
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl delete pod db-tcp-test -n ${{ env.K8S_NAMESPACE }} --ignore-not-found

      - name: Test PostgreSQL connection from cluster
        run: |
          kubectl delete pod db-pg-test -n ${{ env.K8S_NAMESPACE }} --ignore-not-found
          cat <<'EOF' | kubectl apply -n ${{ env.K8S_NAMESPACE }} -f -
          apiVersion: v1
          kind: Pod
          metadata:
            name: db-pg-test
          spec:
            restartPolicy: Never
            containers:
              - name: test
                image: node:20-slim
                command:
                  - /bin/bash
                  - -c
                  - |
                    echo "=== DATABASE_URL structure ==="
                    echo "$DATABASE_URL" | sed 's/:\/\/[^:]*:[^@]*@/:\/\/***:***@/'
                    echo ""
                    echo "=== Installing pg ==="
                    npm install pg --no-save 2>&1 | tail -3
                    echo ""
                    echo "=== Testing connection with pg library ==="
                    node -e "
                    const { Pool } = require('pg');
                    const pool = new Pool({ connectionString: process.env.DATABASE_URL, connectionTimeoutMillis: 10000 });
                    pool.query('SELECT NOW() as now, current_database() as db, current_user as usr')
                      .then(r => { console.log('SUCCESS:', JSON.stringify(r.rows[0])); process.exit(0); })
                      .catch(e => { console.log('FAILED:', e.message); process.exit(1); });
                    "
                    echo ""
                    echo "=== Done ==="
                env:
                  - name: DATABASE_URL
                    valueFrom:
                      secretKeyRef:
                        name: kotvim-code-secrets
                        key: DATABASE_URL
          EOF
          echo "Waiting for PG test pod..."
          sleep 30
          echo "## PostgreSQL Connection Test" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl logs db-pg-test -n ${{ env.K8S_NAMESPACE }} 2>&1 | tee -a $GITHUB_STEP_SUMMARY || echo "Could not get logs"
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl delete pod db-pg-test -n ${{ env.K8S_NAMESPACE }} --ignore-not-found

      - name: Get app pod logs
        run: |
          echo "## App Pod Logs (last 50 lines)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          POD=$(kubectl get pods -n ${{ env.K8S_NAMESPACE }} -l app=kotvim-code -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
          if [ -n "$POD" ]; then
            kubectl logs "$POD" -n ${{ env.K8S_NAMESPACE }} --tail=50 2>&1 | tee -a $GITHUB_STEP_SUMMARY || echo "Could not get app logs (RBAC?)"
          else
            echo "No app pods found" | tee -a $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY
