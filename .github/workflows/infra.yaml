name: Infrastructure Setup

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: eu-west-1
  EKS_CLUSTER_NAME: pressto-prod
  K8S_NAMESPACE: kotvim-code
  RDS_DB_NAME: kotvim_code
  RDS_MASTER_USER: kotvim
  RDS_ALLOCATED_STORAGE: "20"
  RDS_INSTANCE_CLASS: db.t4g.micro

jobs:
  setup-infrastructure:
    runs-on: ubuntu-latest
    name: Setup RDS & K8s Secrets

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get EKS cluster VPC details
        id: eks
        run: |
          CLUSTER_INFO=$(aws eks describe-cluster \
            --name ${{ env.EKS_CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }})

          VPC_ID=$(echo "$CLUSTER_INFO" | jq -r '.cluster.resourcesVpcConfig.vpcId')
          SUBNET_IDS=$(echo "$CLUSTER_INFO" | jq -r '.cluster.resourcesVpcConfig.subnetIds | join(" ")')
          CLUSTER_SG=$(echo "$CLUSTER_INFO" | jq -r '.cluster.resourcesVpcConfig.clusterSecurityGroupId')

          echo "vpc_id=$VPC_ID" >> $GITHUB_OUTPUT
          echo "subnet_ids=$SUBNET_IDS" >> $GITHUB_OUTPUT
          echo "cluster_sg=$CLUSTER_SG" >> $GITHUB_OUTPUT

          echo "VPC: $VPC_ID | Cluster SG: $CLUSTER_SG"

      - name: Create RDS Security Group
        id: rds-sg
        run: |
          VPC_ID="${{ steps.eks.outputs.vpc_id }}"
          CLUSTER_SG="${{ steps.eks.outputs.cluster_sg }}"

          # Check if SG already exists
          EXISTING=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=kotvim-code-rds-sg" "Name=vpc-id,Values=$VPC_ID" \
            --region ${{ env.AWS_REGION }} \
            --query 'SecurityGroups[0].GroupId' --output text 2>/dev/null || echo "None")

          if [ "$EXISTING" = "None" ] || [ -z "$EXISTING" ]; then
            SG_ID=$(aws ec2 create-security-group \
              --group-name kotvim-code-rds-sg \
              --description "kotvim-code RDS SG" \
              --vpc-id "$VPC_ID" \
              --region ${{ env.AWS_REGION }} \
              --query 'GroupId' --output text)

            # Allow PostgreSQL from EKS cluster security group
            aws ec2 authorize-security-group-ingress \
              --group-id "$SG_ID" --protocol tcp --port 5432 \
              --source-group "$CLUSTER_SG" \
              --region ${{ env.AWS_REGION }} 2>/dev/null || true

            # Allow PostgreSQL from entire VPC CIDR
            VPC_CIDR=$(aws ec2 describe-vpcs --vpc-ids "$VPC_ID" \
              --region ${{ env.AWS_REGION }} \
              --query 'Vpcs[0].CidrBlock' --output text)
            aws ec2 authorize-security-group-ingress \
              --group-id "$SG_ID" --protocol tcp --port 5432 \
              --cidr-ipv4 "$VPC_CIDR" \
              --region ${{ env.AWS_REGION }} 2>/dev/null || true

            echo "Created SG: $SG_ID"
          else
            SG_ID="$EXISTING"
            echo "SG already exists: $SG_ID"
          fi

          echo "sg_id=$SG_ID" >> $GITHUB_OUTPUT

      - name: Create RDS DB Subnet Group
        run: |
          aws rds create-db-subnet-group \
            --db-subnet-group-name kotvim-code-db-subnet \
            --db-subnet-group-description "kotvim-code RDS subnets" \
            --subnet-ids ${{ steps.eks.outputs.subnet_ids }} \
            --region ${{ env.AWS_REGION }} 2>/dev/null || echo "Subnet group already exists"

      - name: Get latest PostgreSQL 16.x version
        id: pg
        run: |
          PG_VERSION=$(aws rds describe-db-engine-versions \
            --engine postgres \
            --region ${{ env.AWS_REGION }} \
            --query "DBEngineVersions[?starts_with(EngineVersion, '16.')].EngineVersion" \
            --output text | tr '\t' '\n' | sort -V | tail -1)

          echo "version=$PG_VERSION" >> $GITHUB_OUTPUT
          echo "Using PostgreSQL $PG_VERSION"

      - name: Generate RDS password
        id: rds-pass
        run: |
          PASSWORD=$(openssl rand -base64 32 | tr -d "=+/" | cut -c1-25)
          echo "::add-mask::$PASSWORD"
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT

      - name: Create RDS instance
        run: |
          aws rds create-db-instance \
            --db-instance-identifier kotvim-code-db \
            --db-instance-class ${{ env.RDS_INSTANCE_CLASS }} \
            --engine postgres \
            --engine-version ${{ steps.pg.outputs.version }} \
            --master-username ${{ env.RDS_MASTER_USER }} \
            --master-user-password "${{ steps.rds-pass.outputs.password }}" \
            --allocated-storage ${{ env.RDS_ALLOCATED_STORAGE }} \
            --db-name ${{ env.RDS_DB_NAME }} \
            --vpc-security-group-ids ${{ steps.rds-sg.outputs.sg_id }} \
            --db-subnet-group-name kotvim-code-db-subnet \
            --no-publicly-accessible \
            --storage-type gp3 \
            --storage-encrypted \
            --backup-retention-period 7 \
            --region ${{ env.AWS_REGION }} \
            --tags Key=Project,Value=kotvim-code 2>/dev/null || echo "RDS instance may already exist"

      - name: Wait for RDS to be available
        run: |
          echo "Waiting for RDS (5-10 min)..."
          aws rds wait db-instance-available \
            --db-instance-identifier kotvim-code-db \
            --region ${{ env.AWS_REGION }}

      - name: Get RDS endpoint
        id: rds
        run: |
          ENDPOINT=$(aws rds describe-db-instances \
            --db-instance-identifier kotvim-code-db \
            --region ${{ env.AWS_REGION }} \
            --query 'DBInstances[0].Endpoint.Address' --output text)

          echo "endpoint=$ENDPOINT" >> $GITHUB_OUTPUT
          echo "RDS endpoint: $ENDPOINT"

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Create K8s namespace and secrets
        run: |
          kubectl create namespace ${{ env.K8S_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

          NEXTAUTH_SECRET=$(openssl rand -base64 32)
          DATABASE_URL="postgresql://${{ env.RDS_MASTER_USER }}:${{ steps.rds-pass.outputs.password }}@${{ steps.rds.outputs.endpoint }}:5432/${{ env.RDS_DB_NAME }}?schema=public"

          kubectl create secret generic kotvim-code-secrets \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --from-literal=DATABASE_URL="$DATABASE_URL" \
            --from-literal=NEXTAUTH_SECRET="$NEXTAUTH_SECRET" \
            --from-literal=NEXTAUTH_URL="https://kotvim-code.luposec.io" \
            --from-literal=GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
            --from-literal=GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          echo "K8s secrets created in namespace ${{ env.K8S_NAMESPACE }}"

      - name: Ensure Route 53 IAM permissions
        run: |
          ROLE_NAME="kotvim-code-github-actions"
          # Self-apply Route 53 policy if not already present
          aws iam put-role-policy \
            --role-name "$ROLE_NAME" \
            --policy-name "route53-access" \
            --policy-document '{
              "Version": "2012-10-17",
              "Statement": [{
                "Sid": "Route53HostedZones",
                "Effect": "Allow",
                "Action": [
                  "route53:CreateHostedZone",
                  "route53:GetHostedZone",
                  "route53:ListHostedZones",
                  "route53:ListHostedZonesByName",
                  "route53:ChangeResourceRecordSets",
                  "route53:ListResourceRecordSets",
                  "route53:GetChange"
                ],
                "Resource": "*"
              }]
            }'
          echo "Route 53 IAM policy applied"
          # Brief pause to let IAM propagate
          sleep 5

      - name: Create Route 53 Hosted Zone
        id: r53
        run: |
          DOMAIN="kotvim-code.luposec.io"

          # Check if hosted zone already exists
          ZONE_ID=$(aws route53 list-hosted-zones-by-name \
            --dns-name "$DOMAIN" \
            --query "HostedZones[?Name=='${DOMAIN}.'].Id" \
            --output text | head -1 | sed 's|/hostedzone/||')

          if [ -z "$ZONE_ID" ] || [ "$ZONE_ID" = "None" ]; then
            echo "Creating hosted zone for $DOMAIN..."
            RESULT=$(aws route53 create-hosted-zone \
              --name "$DOMAIN" \
              --caller-reference "kotvim-code-$(date +%s)" \
              --hosted-zone-config Comment="kotvim-code e-learning platform")

            ZONE_ID=$(echo "$RESULT" | jq -r '.HostedZone.Id' | sed 's|/hostedzone/||')
            echo "Created hosted zone: $ZONE_ID"
          else
            echo "Hosted zone already exists: $ZONE_ID"
          fi

          echo "zone_id=$ZONE_ID" >> $GITHUB_OUTPUT

          # Get NS records for Cloudflare delegation
          NS_RECORDS=$(aws route53 get-hosted-zone \
            --id "$ZONE_ID" \
            --query 'DelegationSet.NameServers' --output text)
          echo "============================================"
          echo "  Route 53 NS records (add to Cloudflare):"
          echo "============================================"
          echo "$NS_RECORDS" | tr '\t' '\n'
          echo "============================================"

      - name: Get Ingress LB hostname
        id: ingress-lb
        run: |
          # Find the nginx ingress controller's external LB
          LB_HOSTNAME=$(kubectl get svc -A \
            -o jsonpath='{.items[?(@.spec.type=="LoadBalancer")].status.loadBalancer.ingress[0].hostname}' \
            2>/dev/null | awk '{print $1}')

          if [ -z "$LB_HOSTNAME" ]; then
            # Try looking specifically in ingress-nginx namespace
            LB_HOSTNAME=$(kubectl get svc -n ingress-nginx \
              -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}' 2>/dev/null)
          fi

          if [ -z "$LB_HOSTNAME" ]; then
            echo "WARNING: Could not find ingress controller LB. Checking all namespaces..."
            kubectl get svc -A --field-selector spec.type=LoadBalancer
            exit 1
          fi

          echo "lb_hostname=$LB_HOSTNAME" >> $GITHUB_OUTPUT
          echo "Ingress LB: $LB_HOSTNAME"

      - name: Create Route 53 DNS record
        run: |
          ZONE_ID="${{ steps.r53.outputs.zone_id }}"
          LB_HOSTNAME="${{ steps.ingress-lb.outputs.lb_hostname }}"
          DOMAIN="kotvim-code.luposec.io"

          # Get the ELB hosted zone ID for the alias target
          # eu-west-1 ELB hosted zone
          ELB_ZONE_ID="Z32O12XQLNTSW2"

          # Check if this is a classic ELB or NLB/ALB
          if echo "$LB_HOSTNAME" | grep -q "elb.amazonaws.com"; then
            # Use ALIAS record for AWS ELBs
            aws route53 change-resource-record-sets \
              --hosted-zone-id "$ZONE_ID" \
              --change-batch '{
                "Changes": [{
                  "Action": "UPSERT",
                  "ResourceRecordSet": {
                    "Name": "'"$DOMAIN"'",
                    "Type": "A",
                    "AliasTarget": {
                      "HostedZoneId": "'"$ELB_ZONE_ID"'",
                      "DNSName": "'"$LB_HOSTNAME"'",
                      "EvaluateTargetHealth": true
                    }
                  }
                }]
              }'
            echo "Created ALIAS A record: $DOMAIN -> $LB_HOSTNAME"
          else
            # Use CNAME for non-AWS endpoints
            aws route53 change-resource-record-sets \
              --hosted-zone-id "$ZONE_ID" \
              --change-batch '{
                "Changes": [{
                  "Action": "UPSERT",
                  "ResourceRecordSet": {
                    "Name": "'"$DOMAIN"'",
                    "Type": "CNAME",
                    "TTL": 300,
                    "ResourceRecords": [{"Value": "'"$LB_HOSTNAME"'"}]
                  }
                }]
              }'
            echo "Created CNAME record: $DOMAIN -> $LB_HOSTNAME"
          fi

      - name: Summary
        run: |
          echo "============================================"
          echo "  Infrastructure Setup Complete!"
          echo "============================================"
          echo "  RDS: ${{ steps.rds.outputs.endpoint }}"
          echo "  PG:  ${{ steps.pg.outputs.version }}"
          echo "  NS:  ${{ env.K8S_NAMESPACE }}"
          echo "  Secret: kotvim-code-secrets"
          echo "  DNS Zone: ${{ steps.r53.outputs.zone_id }}"
          echo "  Ingress LB: ${{ steps.ingress-lb.outputs.lb_hostname }}"
          echo ""
          echo "  IMPORTANT: Add NS delegation in Cloudflare!"
          echo "  Next: push to master to trigger deploy!"
